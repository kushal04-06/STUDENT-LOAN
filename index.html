<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinServe | Modern Loan Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { min-height: 100vh; background: #0f172a; overflow: hidden; color: #fff; }

        /* --- BACKGROUND BLOBS --- */
        .blob { position: absolute; filter: blur(80px); z-index: -1; opacity: 0.6; animation: float 10s infinite ease-in-out alternate; }
        .blob-1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; border-radius: 50%; }
        .blob-2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -150px; right: -100px; border-radius: 50%; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: #ec4899; top: 40%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; animation-duration: 15s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        /* --- LOGIN PAGE SECTION --- */
        #login-page {
            display: flex; align-items: center; justify-content: center; height: 100vh; width: 100%;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .login-container {
            position: relative; width: 800px; max-width: 90%; height: 480px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; overflow: hidden; z-index: 10;
        }
        .form-section { width: 55%; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .form-inner { width: 100%; max-width: 280px; margin: 0 auto; }
        .form-inner h2 { font-size: 26px; margin-bottom: 30px; text-align: center; }
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group input { width: 100%; padding: 10px 0; background: transparent; border: none; border-bottom: 2px solid rgba(255, 255, 255, 0.2); color: #fff; outline: none; }
        .input-group label { position: absolute; left: 0; top: 10px; color: #cbd5e1; font-size: 13px; transition: 0.3s; pointer-events: none; }
        .input-group input:focus ~ label, .input-group input:valid ~ label { top: -15px; font-size: 11px; color: #a855f7; }
        .login-btn { width: 100%; padding: 12px; background: linear-gradient(to right, #6b21c4, #9932cc); border: none; border-radius: 30px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .info-section { width: 45%; background: rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }

        /* --- DASHBOARD SECTION (Hidden by Default) --- */
        #dashboard-page { 
            display: none; height: 100vh; width: 100%; 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px);
        }
        .sidebar { width: 260px; background: rgba(255, 255, 255, 0.05); border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 30px 20px; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .loan-card { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 25px; text-align: center; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1); }
        .loan-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.1); }
        .card-icon { font-size: 40px; margin-bottom: 15px; }
        .apply-btn { margin-top: 15px; padding: 8px 20px; border-radius: 20px; border: none; background: #6366f1; color: white; cursor: pointer; }

        /* --- UTILS --- */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <section id="login-page">
        <div class="login-container">
            <div class="form-section">
                <div class="form-inner">
                    <h2>Login</h2>
                    <form id="loginForm">
                        <div class="input-group">
                            <input type="text" id="user" required>
                            <label>Username</label>
                        </div>
                        <div class="input-group">
                            <input type="password" id="pass" required>
                            <label>Password</label>
                        </div>
                        <button type="submit" class="login-btn">Login to Dashboard</button>
                    </form>
                </div>
            </div>
            <div class="info-section">
                <h1>WELCOME<br>BACK!</h1>
                <p style="font-size: 12px; margin-top: 10px; color: #cbd5e1;">Manage your loans with the most secure platform.</p>
            </div>
        </div>
    </section>

    <section id="dashboard-page">
        <div style="display: flex; height: 100%;">
            <div class="sidebar">
                <h2 style="background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px;">FinServe</h2>
                <p style="color: #6366f1; margin-bottom: 20px;">📊 Dashboard</p>
                <p style="opacity: 0.6; margin-bottom: 20px;">💳 My Loans</p>
                <p style="opacity: 0.6; margin-bottom: 20px;">⚙️ Settings</p>
                <button onclick="location.reload()" style="margin-top: auto; background: none; border: 1px solid red; color: red; padding: 5px; cursor: pointer; border-radius: 5px;">Logout</button>
            </div>
            <div class="main-content">
                <h1 style="margin: 20px;">Available Loan Types</h1>
                <div class="cards-grid">
                    <div class="loan-card"><div class="card-icon">🏠</div><h3>Home Loan</h3><p>8.5% Interest</p><button class="apply-btn">Apply</button></div>
                    <div class="loan-card"><div class="card-icon">🚗</div><h3>Vehicle Loan</h3><p>9.0% Interest</p><button class="apply-btn">Apply</button></div>
                    <div class="loan-card"><div class="card-icon">🎓</div><h3>Education Loan</h3><p>7.0% Interest</p><button class="apply-btn">Apply</button></div>
                    <div class="loan-card"><div class="card-icon">💰</div><h3>Gold Loan</h3><p>6.5% Interest</p><button class="apply-btn">Apply</button></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // HANDLE LOGIN TRANSITION
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const loginSection = document.getElementById('login-page');
            const dashSection = document.getElementById('dashboard-page');

            // 1. Fade out login
            loginSection.style.opacity = '0';
            
            setTimeout(() => {
                // 2. Hide login, show dashboard
                loginSection.classList.add('hidden');
                dashSection.style.display = 'block';
                dashSection.classList.add('fade-in');
            }, 500);
        });
    </script>
</body>
</html>
